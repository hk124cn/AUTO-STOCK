# ============================================================
# stock.auto-claw.top 独立配置文件
# 部署位置：/etc/nginx/conf.d/stock-system.conf
# 不影响 auto-claw.top、www.auto-claw.top、其他所有现有服务
# ============================================================

# HTTP → HTTPS
server {
    listen 80;
    server_name stock.auto-claw.top;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name stock.auto-claw.top;

    # 复用现有 SSL 证书（*.auto-claw.top 通配符证书，Cloudflare Origin）
    ssl_certificate /ssl/cert.pem;
    ssl_certificate_key /ssl/cert.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== 前端静态文件（直接 serve dist 目录）=====
    root /home/admin/AUTO-STOCK/web/stock-system/dist;
    index index.html;

    # Vue Router history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ===== API 代理（指向 8000 端口的 FastAPI）=====
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== 数据文件（精确子路径，不暴露项目根）=====
    location /data/signals/ {
        alias /home/admin/AUTO-STOCK/result/signals/;
        autoindex off;
    }

    location /data/daily_score/ {
        alias /home/admin/AUTO-STOCK/result/daily_score/;
        autoindex off;
    }

    location /data/price/ {
        alias /home/admin/AUTO-STOCK/data/price/;
        autoindex off;
    }

    location = /data/score_price_history.csv {
        alias /home/admin/AUTO-STOCK/result/score_price_history.csv;
    }

    # ===== 显式禁止访问敏感文件 =====
    # 禁止 portfolio.db 等数据库
    location ~* /data/.*\.db$ {
        deny all;
        return 404;
    }

    # 禁止访问项目代码/敏感文件
    location ~* \.(py|log|sql|sqlite|sqlite3|bak|env|ini|conf|cfg)$ {
        deny all;
        return 404;
    }

    # 禁止访问 .git / .svn / .htaccess 等元数据目录
    location ~ /\.(git|svn|hg|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # 禁止访问 backup / pycache 等目录
    location ~* /(bak|backup|__pycache__)/ {
        deny all;
        return 404;
    }

    # 禁止访问 /data/ 根（避免路径探测）
    location ~ ^/data/$ {
        deny all;
        return 404;
    }

    # ===== 日志 =====
    access_log /var/log/nginx/stock-system.access.log;
    error_log /var/log/nginx/stock-system.error.log;
}
