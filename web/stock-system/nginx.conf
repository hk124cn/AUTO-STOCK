# stock.auto-claw.top Nginx 配置
# 放置在 /etc/nginx/conf.d/stock-system.conf

# HTTP -> HTTPS
server {
    listen 80;
    server_name stock.auto-claw.top;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stock.auto-claw.top;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/auto-claw.top.pem;
    ssl_certificate_key /etc/nginx/ssl/auto-claw.top.key;

    # ===== 安全头（修复 4.3: 补全 CSP/HSTS/Referrer/Permissions）=====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # 简单 CSP（允许 inline style 用于 Vue/Vite，禁 unsafe-eval）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # ===== 前端静态文件 =====
    root /home/admin/AUTO-STOCK/web/stock-system/dist;
    index index.html;

    # Vue Router history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ===== API 代理 =====
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== 静态数据文件（修复 4.1: 精确子路径，不暴露项目根）=====

    # 信号数据 — 按版本分目录（v1/v2/...），正则 location 自动覆盖新增版本
    location ~ ^/data/signals/v[0-9]+/ {
        alias /home/admin/AUTO-STOCK/result/signals/;
        autoindex off;
        add_header Access-Control-Allow-Origin "https://stock.auto-claw.top" always;
        add_header Access-Control-Allow-Methods "GET" always;
    }

    # 每日评分
    location /data/daily_score/ {
        alias /home/admin/AUTO-STOCK/result/daily_score/;
        autoindex off;
        add_header Access-Control-Allow-Origin "https://stock.auto-claw.top" always;
    }

    # 个股价格
    location /data/price/ {
        alias /home/admin/AUTO-STOCK/data/price/;
        autoindex off;
        add_header Access-Control-Allow-Origin "https://stock.auto-claw.top" always;
    }

    # 评分历史（用于刷新价格等）
    location /data/score_price_history.csv {
        alias /home/admin/AUTO-STOCK/result/score_price_history.csv;
        add_header Access-Control-Allow-Origin "https://stock.auto-claw.top" always;
    }

    # ===== 明确禁止访问（修复 4.1: 防止路径探测泄露敏感文件）=====
    # 禁止 portfolio.db（持仓数据库，含真实账户）
    location ~* /data/.*\.db$ {
        deny all;
        return 404;
    }

    # 禁止访问 .env / .git / .py / .log 等敏感文件
    location ~ /\.(env|git|svn|htaccess) {
        deny all;
        return 404;
    }

    location ~* \.(py|log|sql|sqlite|sqlite3|bak)$ {
        deny all;
        return 404;
    }

    # 禁止访问 backup / bak 目录
    location ~* /(bak|backup|__pycache__)/ {
        deny all;
        return 404;
    }

    # 禁止访问项目根
    location ~ ^/data/$ {
        deny all;
        return 404;
    }

    # ===== 日志 =====
    access_log /var/log/nginx/stock-system.access.log;
    error_log /var/log/nginx/stock-system.error.log;
}
