import time
import akshare as ak
import pandas as pd
from datetime import datetime
from src.core.base_factor import BaseFactor


def get_stock_ytd_return(code, max_retry=3):
    """获取股票年初至今收益，限定日期范围"""
    # 获取今年日期范围
    today = datetime.today()
    year_start = f"{today.year}0101"  # 20260101
    today_str = today.strftime("%Y%m%d")  # 20260219
    
    for i in range(max_retry):
        try:
            if i > 0:
                time.sleep(2)
            
            # ✅ 限定日期范围，只获取今年数据
            df = ak.stock_zh_a_hist(
                symbol=code, 
                period="daily", 
                start_date=year_start,  # 今年开始
                end_date=today_str,      # 今天结束
                adjust="qfq"
            )
            
            if df.empty or len(df) < 2:
                print(f"⚠️ {code} 数据不足")
                return 0
            
            # 列名兼容
            close_col = "收盘" if "收盘" in df.columns else "close"
            
            start_price = df.iloc[0][close_col]
            latest_price = df.iloc[-1][close_col]
            
            ret = (latest_price / start_price - 1) * 100
            print(f"✅ {code} 获取成功: {len(df)}条数据, 涨幅{ret:.2f}%")
            return ret
            
        except Exception as e:
            print(f"⚠️ {code} 第{i+1}次失败: {str(e)[:50]}")
            if i == max_retry - 1:
                return 0


def get_index_ytd_return(max_retry=3):
    """获取上证指数年初至今收益"""
    today = datetime.today()
    year_start = f"{today.year}0101"
    today_str = today.strftime("%Y%m%d")
    
    for i in range(max_retry):
        try:
            if i > 0:
                time.sleep(2)
            
            # 指数接口可能不支持日期参数，尝试限定
            try:
                df = ak.stock_zh_index_daily_em(
                    symbol="000001",
                    start_date=year_start,
                    end_date=today_str
                )
            except:
                # 备用：获取全部然后过滤
                df = ak.stock_zh_index_daily(symbol="sh000001")
                date_col = "日期" if "日期" in df.columns else "date"
                df[date_col] = pd.to_datetime(df[date_col])
                year_start_ts = pd.Timestamp(year=today.year, month=1, day=1)
                df = df[df[date_col] >= year_start_ts]
            
            if df.empty or len(df) < 2:
                return 0
            
            close_col = "收盘" if "收盘" in df.columns else "close"
            start_price = df.iloc[0][close_col]
            latest_price = df.iloc[-1][close_col]
            
            return (latest_price / start_price - 1) * 100
            
        except Exception as e:
            print(f"⚠️ 指数第{i+1}次失败")
            if i == max_retry - 1:
                return 0


class RelativeStrengthFactor(BaseFactor):
    weight = 10

    def calculate(self):
        # 获取个股收益
        stock_ret = get_stock_ytd_return(self.code)
        
        time.sleep(0.5)  # 短暂间隔
        
        # 获取指数收益（缓存或全局变量可优化）
        index_ret = get_index_ytd_return()

        relative = stock_ret - index_ret

        # 打分逻辑
        if relative > 20:
            score = 10
        elif relative > 10:
            score = 8
        elif relative > 0:
            score = 6
        elif relative > -5:
            score = 4
        elif relative > -10:
            score = 3
        else:
            score = 2

        print(f"今年个股涨幅: {stock_ret:.2f}%")
        print(f"今年大盘涨幅: {index_ret:.2f}%")
        print(f"相对强弱: {relative:.2f}%")

        return {
            "name": "今年相对大盘强弱",
            "score": score,
            "sum_score": 10
        }
